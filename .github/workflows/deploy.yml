name: CI/CD — RAG Chatbot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar ruff
        run: pip install "ruff>=0.6.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Pytest con cobertura
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login en ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build de la imagen
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/rag-chatbot"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      # La imagen se prueba antes de publicarla: se levanta contra un Postgres y un
      # Qdrant efímeros y se exige que /health responda "ok" (no "degraded"). Valida
      # de una vez el Dockerfile, las dependencias, el CMD y la conexión a la base de datos.
      - name: Smoke test de la imagen
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/rag-chatbot:${{ github.sha }}"
          docker network create ci-net

          docker run -d --name ci-db --network ci-net \
            -e POSTGRES_USER=raguser \
            -e POSTGRES_PASSWORD=ragpass \
            -e POSTGRES_DB=ragdb \
            postgres:16-alpine

          docker run -d --name ci-qdrant --network ci-net qdrant/qdrant:latest

          echo "Esperando a Postgres..."
          for i in $(seq 1 30); do
            if docker exec ci-db pg_isready -U raguser -d ragdb >/dev/null 2>&1; then
              echo "Postgres listo"
              break
            fi
            sleep 2
          done

          docker run -d --name ci-app --network ci-net -p 8000:8000 \
            -e DATABASE_URL="postgresql://raguser:ragpass@ci-db:5432/ragdb" \
            -e QDRANT_URL="http://ci-qdrant:6333" \
            -e SECRET_KEY="ci-smoke-test-not-a-real-secret" \
            -e APP_USER="ci" \
            -e APP_PASSWORD="ci" \
            "$IMAGE"

          echo "Comprobando /health de la imagen..."
          for i in $(seq 1 20); do
            code=$(curl -s -o /tmp/image-health.json -w "%{http_code}" http://localhost:8000/health || true)
            echo "Intento $i → HTTP $code"
            if [ "$code" = "200" ] && grep -q '"status":"ok"' /tmp/image-health.json; then
              echo "Imagen validada:"; cat /tmp/image-health.json
              exit 0
            fi
            sleep 3
          done

          echo "La imagen no superó el smoke test. Última respuesta:"
          cat /tmp/image-health.json 2>/dev/null || echo "(sin respuesta)"
          echo "--- Logs del contenedor ---"
          docker logs ci-app
          exit 1

      - name: Limpiar contenedores del smoke test
        if: always()
        run: |
          docker rm -f ci-app ci-qdrant ci-db >/dev/null 2>&1 || true
          docker network rm ci-net >/dev/null 2>&1 || true

      - name: Push de la imagen a ACR
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/rag-chatbot"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configurar acceso al registry
        run: |
          ACR_PASSWORD=$(az acr credential show \
            --name ${{ vars.ACR_NAME }} \
            --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --server ${{ vars.ACR_LOGIN_SERVER }} \
            --username ${{ vars.ACR_NAME }} \
            --password "$ACR_PASSWORD"

      - name: Inyectar secretos en Container Apps
        run: |
          az containerapp secret set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --secrets \
              "app-user=${{ secrets.APP_USER }}" \
              "app-password=${{ secrets.APP_PASSWORD }}" \
              "secret-key=${{ secrets.SECRET_KEY }}" \
              "azure-openai-api-key=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "qdrant-url=${{ secrets.QDRANT_URL }}" \
              "qdrant-api-key=${{ secrets.QDRANT_API_KEY }}" \
              "database-url=${{ secrets.DATABASE_URL }}"

      - name: Desplegar nueva imagen
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "${{ vars.ACR_LOGIN_SERVER }}/rag-chatbot:${{ github.sha }}" \
            --set-env-vars \
              "APP_USER=secretref:app-user" \
              "APP_PASSWORD=secretref:app-password" \
              "SECRET_KEY=secretref:secret-key" \
              "AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key" \
              "QDRANT_URL=secretref:qdrant-url" \
              "QDRANT_API_KEY=secretref:qdrant-api-key" \
              "DATABASE_URL=secretref:database-url" \
              "AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_CHAT_DEPLOYMENT=${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT }}" \
              "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=${{ vars.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}" \
              "AZURE_OPENAI_API_VERSION=2024-10-21"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Comprobar /health
        run: |
          FQDN=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          URL="https://$FQDN/health"
          echo "Smoke test → $URL"
          for i in $(seq 1 10); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL" || true)
            echo "Intento $i → HTTP $code"
            if [ "$code" = "200" ] && grep -q '"status":"ok"' /tmp/health.json; then
              echo "Health OK:"; cat /tmp/health.json
              exit 0
            fi
            sleep 15
          done
          echo "Smoke test fallido. Última respuesta:"; cat /tmp/health.json || true
          exit 1
