<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main id="main-content">
    <section class="login-card" aria-labelledby="login-heading">
      <div class="login-card__brand">
        <svg width="30" height="30" viewBox="0 0 28 28" aria-hidden="true" focusable="false">
          <rect width="28" height="28" rx="7" fill="var(--accent)"></rect>
          <path d="M8 9.5h9M8 14h12M8 18.5h7" stroke="#EAF3F2" stroke-width="1.6" stroke-linecap="round"></path>
          <circle cx="20.5" cy="18.5" r="1.8" fill="#EAF3F2"></circle>
        </svg>
        <span class="brand__text"><strong>RAG</strong> Chatbot</span>
      </div>

      <h1 id="login-heading">Iniciar sesión</h1>
      <p class="login-card__lead">Consulta tus documentos con respuestas citadas.</p>

      {% if error %}
      <p class="alert alert--error" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" novalidate>
        <div class="field">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            autocomplete="username"
            aria-required="true"
          >
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            aria-required="true"
          >
        </div>
        <button type="submit" class="btn btn--block">Entrar</button>
      </form>
    </section>
  </main>
</body>
</html>
